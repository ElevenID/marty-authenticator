# Enhanced pre-commit configuration - progressive approach
# See https://pre-commit.com for more information
repos:
  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.5.0
    hooks:
      - id: trailing-whitespace
        args: [--markdown-linebreak-ext=md]
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--allow-multiple-documents]
        exclude: ^pubspec\.yaml$
      - id: check-json
      - id: check-toml
      - id: check-xml
      - id: check-added-large-files
        args: ["--maxkb=500"]
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: mixed-line-ending
        args: [--fix=lf]
      - id: check-vcs-permalinks
      - id: forbid-new-submodules
      - id: fix-byte-order-marker
      - id: check-executables-have-shebangs
      - id: check-shebang-scripts-are-executable
      - id: no-commit-to-branch
        args: [--branch, main, --branch, master]
      - id: requirements-txt-fixer
        files: requirements.*\.txt$
      - id: check-docstring-first

  # Security - Basic Secret Detection
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.4.0
    hooks:
      - id: detect-secrets
        args: ["--baseline", ".secrets.baseline"]
        exclude: package-lock.json

  # Security - Bandit for Python security issues
  - repo: https://github.com/PyCQA/bandit
    rev: "1.7.5"
    hooks:
      - id: bandit
        args: ["-r", "--format", "custom"]
        exclude: |
          (?x)(
              ^tests/.*$|
              ^local_plugins/.*\.py$|
              .*ephemeral.*|
              .*flutter_lldb_helper\.py$
          )

  # Python formatting and linting
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.1.15
    hooks:
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
        exclude: |
          (?x)(
              ^local_plugins/.*\.py$|
              .*ephemeral.*|
              .*flutter_lldb_helper\.py$
          )
      - id: ruff-format
        exclude: |
          (?x)(
              ^local_plugins/.*\.py$|
              .*ephemeral.*|
              .*flutter_lldb_helper\.py$
          )

  # Python import sorting
  - repo: https://github.com/PyCQA/isort
    rev: 5.13.2
    hooks:
      - id: isort
        args: ["--profile", "black", "--line-length", "88"]
        exclude: |
          (?x)(
              ^local_plugins/.*\.py$|
              .*ephemeral.*|
              .*flutter_lldb_helper\.py$
          )

  # Python type checking
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.7.1
    hooks:
      - id: mypy
        args: [--ignore-missing-imports, --strict-optional]
        exclude: |
          (?x)(
              ^tests/.*$|
              ^local_plugins/.*\.py$|
              .*ephemeral.*|
              .*flutter_lldb_helper\.py$
          )

  # Dead code detection
  - repo: https://github.com/jendrikseipp/vulture
    rev: v2.10
    hooks:
      - id: vulture
        exclude: |
          (?x)(
              ^tests/.*$|
              ^local_plugins/.*\.py$|
              .*ephemeral.*|
              .*flutter_lldb_helper\.py$
          )

  # Markdown linting
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.37.0
    hooks:
      - id: markdownlint
        args: ["--fix"]
        exclude: ^(CHANGELOG\.md|\.secrets\.baseline)$

  # Flutter/Dart specific checks
  - repo: local
    hooks:
      # Dart format
      - id: dart-format
        name: Dart Format
        entry: dart format lib/ test/ integration_test/
        language: system
        files: \.dart$
        pass_filenames: false

      # Flutter analyze - Skip for now due to dependency compatibility issues
      # - id: flutter-analyze
      #   name: Flutter Analyze
      #   entry: flutter
      #   args: [analyze, --fatal-infos]
      #   language: system
      #   files: \.dart$
      #   pass_filenames: false

      # Dart fix (dry run to check for available fixes)
      - id: dart-fix-check
        name: Dart Fix (dry-run)
        entry: dart
        args: [fix, --dry-run]
        language: system
        files: \.dart$
        pass_filenames: false
        stages: [manual]

      # Check for pubspec.yaml formatting
      - id: pubspec-yaml-check
        name: Pubspec YAML Check
        entry: flutter pub get
        language: system
        files: pubspec\.yaml$
        pass_filenames: false
        stages: [manual]

      # Custom security check for API keys in Dart files
      - id: dart-secrets-check
        name: Check Dart files for secrets
        entry: sh -c 'grep -rn "api[_-]key\|secret\|token\|password" lib/ --include="*.dart" || true'
        language: system
        files: \.dart$
        pass_filenames: false
        stages: [manual]
