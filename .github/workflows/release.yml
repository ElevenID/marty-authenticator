name: Release signed authenticator

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  android:
    if: vars.ENABLE_ANDROID_RELEASE_SIGNING == 'true'
    runs-on: ubuntu-latest
    environment: release
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9
        with:
          distribution: zulu
          java-version: "21"
      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: stable
          flutter-version: "3.44.6"
      - name: Configure Android signing
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_STORE_PASSWORD: ${{ secrets.ANDROID_STORE_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "$ANDROID_KEYSTORE_BASE64"
          mkdir -p android/app/src/netknights
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/src/netknights/release.jks
          cat > android/app/src/netknights/key.properties <<EOF
          storeFile=release.jks
          storePassword=$ANDROID_STORE_PASSWORD
          keyAlias=$ANDROID_KEY_ALIAS
          keyPassword=$ANDROID_KEY_PASSWORD
          EOF
      - run: flutter pub get
      - run: flutter gen-l10n
      - name: Build signed Android installers
        run: |
          flutter build apk --release --flavor netknights -t lib/main_document.dart
          flutter build appbundle --release --flavor netknights -t lib/main_document.dart
      - name: Collect release assets
        shell: bash
        run: |
          mkdir release-assets
          cp build/app/outputs/flutter-apk/*-release.apk release-assets/
          cp build/app/outputs/bundle/netknightsRelease/*.aab release-assets/
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: spdx-json
          output-file: release-assets/marty-authenticator.spdx.json
      - uses: sigstore/cosign-installer@d58896d6a1865668819e1d91763c7751a165e159
      - name: Sign and checksum release assets
        shell: bash
        run: |
          find release-assets -type f ! -name '*.sigstore.json' -print0 | while IFS= read -r -d '' file; do
            cosign sign-blob --yes --bundle "${file}.sigstore.json" "$file"
          done
          (cd release-assets && find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS)
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: release-assets/**
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: release-assets/**

  source-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Build source release
        shell: bash
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          mkdir release-assets
          git archive --format=tar.gz \
            --prefix="marty-authenticator-${version}/" \
            --output="release-assets/marty-authenticator-${version}-source.tar.gz" \
            HEAD
      - uses: anchore/sbom-action@e22c389904149dbc22b58101806040fa8d37a610
        with:
          path: .
          format: spdx-json
          output-file: release-assets/marty-authenticator.spdx.json
      - name: Generate checksums
        working-directory: release-assets
        run: find . -type f -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS
      - uses: actions/attest-build-provenance@43d14bc2b83dec42d39ecae14e916627a18bb661
        with:
          subject-path: release-assets/**
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          generate_release_notes: true
          files: release-assets/**
