name: Flutter Build
on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main

jobs:
  build_ios:
    name: (iOS configuration, unsigned)
    runs-on: macos-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set Xcode version
        uses: maxim-lobanov/setup-xcode@ed7a3b1fda3918c0306d1b724322adc0b8cc0a90
        with:
          xcode-version: "26.6"

      - uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          distribution: "zulu"
          java-version: "17" # Use JDK 17 for better compatibility

      - uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: "stable"
          flutter-version: "3.44.6"

      - run: flutter clean
      - run: flutter --version
      - run: flutter doctor -v
      - run: flutter pub get
      - run: flutter gen-l10n
      # Apple signing credentials are intentionally not used. Validate the
      # generated Xcode project without producing an iOS installer.
      - run: flutter build ios -t "lib/main_document.dart" --debug --flavor netknights --no-codesign --config-only

  build_appbundle:
    name: (Android)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Removed the 'strategy' block with 'api-level' and 'target' matrix
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Set up Java Development Kit
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95
        with:
          distribution: "zulu"
          java-version: "21" # Keeping Java 21 as per your current setup

      - name: Set up Flutter SDK
        uses: subosito/flutter-action@1a449444c387b1966244ae4d4f8c696479add0b2
        with:
          channel: "stable"
          flutter-version: "3.44.6"

      - name: Clean Flutter project
        run: flutter clean

      - name: Display Flutter version
        run: flutter --version

      - name: Run Flutter Doctor
        run: flutter doctor -v

      - name: Get Flutter dependencies
        run: flutter pub get

      - name: Generate localization files
        run: flutter gen-l10n

      # Cache Gradle dependencies for faster subsequent builds
      - name: Cache Gradle dependencies
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # Build the Android APK (Debug)
      - name: Build Android APK (Debug)
        run: flutter build apk -t "lib/main_document.dart" --debug --flavor netknights
