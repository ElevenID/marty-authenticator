name: Code Quality

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: code-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  flutter-quality:
    uses: ElevenID/.github/.github/workflows/quality-flutter.yml@e3b6a5eb5638aa021dfbed8f6eecf5f7cc49874e
    with:
      flutter-version: "3.44.6"
      test-command: flutter test --coverage
      build-command: flutter build apk --debug --flavor netknights -t lib/main_document.dart
