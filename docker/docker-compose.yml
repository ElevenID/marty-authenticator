  #     - ./firebase-emulator:/firebase
  #   restart: unless-stopped

  mysql:
    image: mysql:8.0
    container_name: privacyidea-mysql
    environment:
      - MYSQL_ROOT_PASSWORD=rootpassword
      - MYSQL_DATABASE=privacyidea
      - MYSQL_USER=pi_user
      - MYSQL_PASSWORD=pi_password
    volumes:
      - mysql_data:/var/lib/mysql
    restart: unless-stopped
    ports:
      - "3306:3306"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "pi_user", "-ppi_password"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

  privacyidea:
    build:
      context: ../../marty-privacyidea
      dockerfile: ./deploy/docker/Dockerfile
    image: privacyidea-ssi:latest
    container_name: privacyidea-server
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "8080:8080"
    env_file:
      - .env
    environment:
      # Database configuration
      PI_DB_USER: pi_user
      PI_DB_PASSWORD: pi_password
      PI_DB_HOST: mysql
      PI_DB_PORT: 3306
      PI_DB_NAME: privacyidea
      # Core security settings
      SECRET_KEY: changeme-secret-key-for-demo
      PI_PEPPER: changeme-pepper-for-demo
      PI_ENCFILE: /etc/privacyidea/enckey
      # Load custom token modules - use PRIVACYIDEA prefix for from_prefixed_env()
      PI_TOKEN_MODULES: privacyidea.lib.tokens.custom.demotoken
      # Firebase Cloud Messaging configuration - loaded from .env file
      FIREBASE_CONFIG_FILE: ${FIREBASE_CONFIG_FILE}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_API_KEY: ${FIREBASE_API_KEY}
      FIREBASE_APP_ID: ${FIREBASE_APP_ID}
      FIREBASE_MESSAGING_SENDER_ID: ${FIREBASE_MESSAGING_SENDER_ID}
      # Admin user for initial setup
      PI_ADMIN_USER: admin
      PI_ADMIN_PASSWORD: admin
      PI_ADMIN_EMAIL: admin@localhost
    volumes:
      # Plugin development support
      - ../../marty-privacyidea/privacyidea/lib/plugins:/opt/privacyidea/lib/python3.13/site-packages/privacyidea/lib/plugins
      - ./plugins/custom-tokens:/opt/privacyidea/lib/python3.13/site-packages/privacyidea/lib/tokens/custom
      - ./plugins/custom-eventhandlers:/opt/privacyidea/lib/python3.13/site-packages/privacyidea/lib/eventhandler/custom
      - ./plugins/custom-resolvers:/opt/privacyidea/lib/python3.13/site-packages/privacyidea/lib/resolvers/custom
      # Config and data persistence
      - privacyidea-data:/data/privacyidea
      - privacyidea-config:/etc/privacyidea
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 120s

  # Flutter Authenticator App (Web) - DISABLED (using Android for development)
  # authenticator-web:
  #   build:
  #     context: ..
  #     dockerfile: docker/Dockerfile.flutter.dev
  #   image: marty-authenticator-web:latest
  #   container_name: authenticator-web
  #   depends_on:
  #     - privacyidea
  #   ports:
  #     - "8888:80"
  #   environment:
  #     # Firebase emulator disabled - using real Firebase
  #     - FIREBASE_USE_EMULATOR=false
  #     - PRIVACYIDEA_URL=http://privacyidea:8080
  #   restart: unless-stopped

  # Development convenience - code server for plugin development
  plugin-dev:
    image: codercom/code-server:latest
    container_name: plugin-development
    ports:
      - "8443:8080"
    environment:
      - PASSWORD=developer
      - PUID=1000
      - PGID=1000
    volumes:
      - ./plugins:/home/coder/plugins
      - ./plugins/custom-tokens:/home/coder/custom-tokens
      - ./plugins/custom-eventhandlers:/home/coder/custom-eventhandlers
      - ./plugins/custom-resolvers:/home/coder/custom-resolvers
    restart: unless-stopped

volumes:
  privacyidea-data:
    driver: local
  privacyidea-config:
    driver: local
  mysql_data:
    driver: local
  plugin-dev-config:
    driver: local
