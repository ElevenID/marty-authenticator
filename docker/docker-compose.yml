# Docker Compose for marty-authenticator development
# PrivacyIDEA has been replaced by Marty service with SSE push notifications

services:
  # Development convenience - code server for plugin development
  plugin-dev:
    image: codercom/code-server:4.96.4
    container_name: plugin-development
    ports:
      - "8443:8080"
    environment:
      - PASSWORD=developer
      - PUID=1000
      - PGID=1000
    volumes:
      - ./plugins:/home/coder/plugins
      - ./plugins/custom-tokens:/home/coder/custom-tokens
      - ./plugins/custom-eventhandlers:/home/coder/custom-eventhandlers
      - ./plugins/custom-resolvers:/home/coder/custom-resolvers
    restart: unless-stopped

volumes:
  plugin-dev-config:
    driver: local
