# privacyIDEA Configuration File for Docker Development
# This configuration file specifies custom token modules

# Load custom token modules - Commented out to avoid policy loading issues
# PI_TOKEN_MODULES = ["privacyidea.lib.tokens.custom.demotoken"]

# Additional development settings for plugin development
PI_LOGLEVEL = "INFO"

# Database configuration - MySQL
SQLALCHEMY_DATABASE_URI = "mysql+pymysql://pi_user:pi_password@mysql:3306/privacyidea"

# Secret key for encryption (this should be set to a secure value in production)
SECRET_KEY = "dev-secret-key-change-in-production"

# Salt for hashing (should also be secure in production)
PI_PEPPER = "dev-salt-change-in-production"

# OID4VC Configuration
OID4VC_VERIFIER_ENDPOINT = "https://verifier.privacyidea.org"
OID4VC_ISSUER_ENDPOINT = "https://issuer.privacyidea.org"

# mDoc Configuration
MDOC_READER_PUBLIC_KEY = "/etc/privacyidea/keys/mdoc_reader_public.pem"
MDOC_TRUST_ANCHOR_CERTS = "/etc/privacyidea/keys/trust_anchors/"

# Enable debugging for token loading (if supported)
# PI_DEBUG_TOKEN_LOADING = True
