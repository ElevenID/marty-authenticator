name: privacyidea_authenticator
description: A Digital Document Wallet and Authenticator App.
homepage: https://netknights.it
repository: https://github.com/privacyidea/pi-authenticator
publish_to: none

# The following defines the version and build number for your application.
# A version number is three numbers separated by dots, like 1.2.43
# followed by an optional build number separated by a +.
# Both the version and the builder number may be overridden in flutter
# build by specifying --build-name and --build-number, respectively.
# In Android, build-name is used as versionName while build-number used as versionCode.
# Read more about Android versioning at https://developer.android.com/studio/publish/versioning
# In iOS, build-name is used as CFBundleShortVersionString while build-number used as CFBundleVersion.
# Read more about iOS versioning at
# https://developer.apple.com/library/archive/documentation/General/Reference/InfoPlistKeyReference/Articles/CoreFoundationKeys.html
version: 4.6.0+406003 # TODO Set the right version number

# version: major.minor.build          + 2x major|2x minor|3x build
# version: version number             + build number (optional)
# android: build-name                 + versionCode
# iOS    : CFBundleShortVersionString + CFBundleVersion
environment:
  sdk: ">=3.8.0 < 4.0.0"

dependencies:
  app_links: ^6.3.2
  asn1lib: ^1.5.5
  async: ^2.11.0
  base32: ^2.1.3
  basic_utils: ^5.7.0
  camera: ^0.11.0
  collection: ^1.18.0
  connectivity_plus: ^7.0.0
  crypto: ^3.0.6
  cryptography: ^2.7.0
  device_info_plus: ^12.2.0
  easy_dynamic_theme: ^2.3.1
  encrypt: ^5.0.3
  file_selector: ^1.0.3
  expandable: ^5.0.1
  firebase_core: ^4.1.0
  firebase_messaging: ^16.0.1
  fixnum: ^1.1.1
  fluentui_system_icons: ^1.1.260
  flutter:
    sdk: flutter
  flutter_local_notifications: ^19.4.1
  flutter_localizations:
    sdk: flutter
  flutter_mailer: ^3.0.0
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.4
  flutter_slidable: ^4.0.0
  flutter_svg: ^2.0.16
  flutter_zxing: ^2.1.0
  font_awesome_flutter: ^10.8.0
  getwidget: ^7.0.0
  freezed_annotation: ^2.4.4
  gms_check: ^1.0.3
  google_mlkit_face_detection: ^0.13.1
  hex: ^0.2.0
  home_widget: ^0.8.0
  http: ^1.6.0
  image: ^4.3.0
  image_cropper: ^11.0.0
  image_picker: ^1.1.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  local_auth: ^3.0.0
  local_auth_android: ^2.0.0
  local_auth_darwin: ^2.0.0
  logger: ^2.4.0
  material_design_icons_flutter: ^7.0.7296
  mutex: ^3.1.0
  # no_screenshot: ^0.3.1  # Temporarily removed for macOS build compatibility
  otp: ^3.1.4
  package_info_plus: ^9.0.0
  path_provider: ^2.1.4
  permission_handler: ^12.0.1
  pointycastle: ^3.9.1
  protobuf: ^5.1.0
  riverpod_annotation: ^2.6.0
  shared_preferences: ^2.3.2
  simple_icons: ^14.6.1
  url_launcher: ^6.3.1
  uuid: ^4.5.2
  zxing2: ^0.2.4

  # SpruceID integration dependencies - Real SDK libraries
  ffi: ^2.1.2 # For native library integration
  cbor: ^6.3.7 # For mDoc CBOR encoding/decoding
  dart_jsonwebtoken: ^3.1.1 # For JWT handling in VCs
  # QR and NFC capabilities for authentication
  # qr_code_scanner: ^1.0.1          # For credential offers via QR - TEMPORARILY DISABLED due to AGP 8.x namespace issue
  pinenacl: ^0.6.0 # For additional cryptography support
  jose: ^0.3.5 # For JOSE/JWS operations
  bech32: ^0.2.2 # For did:key encoding
  flutter_ble_peripheral: ^2.0.0 # For ISO 18013-5 BLE mDL presentation

dev_dependencies:
  build_runner: ^2.4.13
  dependency_validator: ^4.1.0
  flutter_launcher_icons: ^0.14.4
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter
  freezed: ^2.5.2
  integration_test:
    sdk: flutter
  json_serializable: ^6.8.0
  mockito: ^5.4.4
  riverpod_generator: ^2.4.0
  riverpod_lint: ^2.3.10

# Dependency overrides to address WASM compatibility issues
dependency_overrides:
  # Temporarily exclude flutter_secure_storage_web to resolve WASM compatibility
  # This addresses dart:html, dart:js, and dart:js_util incompatibilities with WASM
  flutter_secure_storage_web:
    # Use a stub implementation or override to shared_preferences for WASM builds
    path: ./local_wasm_overrides/flutter_secure_storage_web

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec
# The following section is specific to Flutter.
flutter:
  # Automatically create files used for localization
  generate: true

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  # assets:
  #  - images/a_dot_burr.jpeg
  #  - images/a_dot_ham.jpeg
